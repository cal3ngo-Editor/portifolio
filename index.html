<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cal3ngo | Editor & Motion Designer</title>

<style>

html{scroll-behavior:smooth;}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
min-height:100vh;
background:#000;
color:#fff;
overflow-x:hidden;
cursor:none;
}

/* FUNDO OTIMIZADO */

body::before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(rgba(0,0,0,0.92),rgba(0,0,0,0.98)),
url("k.gif") center/cover no-repeat;
filter:grayscale(100%) contrast(130%) brightness(0.7);
z-index:-2;
}

/* GRAIN MAIS LEVE */

body::after{
content:"";
position:fixed;
inset:0;
background:url("https://grainy-gradients.vercel.app/noise.svg");
opacity:0.06;
mix-blend-mode:overlay;
z-index:-1;
pointer-events:none;
}

/* HEADER */

header{
padding:110px 20px 70px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* LOGO SEM FILTRO (COR ORIGINAL) */

.logo{
width:220px;
margin-bottom:20px;
}

/* TÍTULO */

header h1{
font-size:3.4rem;
letter-spacing:7px;
}

/* GLITCH SUPER LEVE (OTIMIZADO) */

header h1::before,
header h1::after{
content:attr(data-text);
position:absolute;
left:0;
top:0;
opacity:0.15;
}

header h1::before{
transform:translate(1px,-1px);
}

header h1::after{
transform:translate(-1px,1px);
}

header p{
margin-top:10px;
font-size:1rem;
color:#bbb;
}

/* MENU */

nav{margin-top:20px;}

nav a{
color:#888;
margin:0 15px;
text-decoration:none;
font-size:0.9rem;
letter-spacing:2px;
}

nav a:hover{color:#fff;}

/* SEÇÕES */

section{
max-width:1000px;
margin:auto;
padding:70px 20px;
border-top:1px solid rgba(255,255,255,0.08);
}

h2{
text-align:center;
margin-bottom:25px;
letter-spacing:3px;
}

p{
color:#ddd;
line-height:1.6;
}

/* CARDS */

.projetos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#080808;
padding:20px;
border:1px solid rgba(255,255,255,0.12);
border-radius:3px;
transition:.2s;
}

.card:hover{
transform:translateY(-4px);
}

/* VIDEO */

.video-container{
display:flex;
justify-content:center;
margin-bottom:30px;
}

iframe{
width:100%;
max-width:700px;
aspect-ratio:16/9;
border:0;
}

/* CONTATO */

.social-icons{
display:flex;
justify-content:center;
gap:18px;
margin-top:15px;
flex-wrap:wrap;
}

.social-icons img{
width:45px;
filter:grayscale(100%);
transition:.2s;
}

.social-icons img:hover{
filter:grayscale(0%);
}

/* CURSOR (MAIS LEVE) */

.sniper-cursor{
position:fixed;
width:28px;
height:28px;
border:1.5px solid #fff;
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:9999;
}

.sniper-cursor::before,
.sniper-cursor::after{
content:"";
position:absolute;
background:#fff;
}

.sniper-cursor::before{
width:1px;
height:100%;
left:50%;
transform:translateX(-50%);
}

.sniper-cursor::after{
height:1px;
width:100%;
top:50%;
transform:translateY(-50%);
}

/* FOOTER */

footer{
text-align:center;
padding:25px;
color:#777;
font-size:0.8rem;
}

</style>
</head>

<body>

<div class="sniper-cursor"></div>

<header>
<img src="oc.png" class="logo">

<h1 data-text="CAL3NGO">CAL3NGO</h1>
<p>Editor de Vídeo • Motion Designer</p>

<nav>
<a href="#sobre">Sobre</a>
<a href="#trabalhos">Trabalhos</a>
<a href="#motion">Motion</a>
<a href="#gameplay">Gameplay</a>
<a href="#contato">Contato</a>
</nav>
</header>

<section id="sobre">
<h2>Sobre</h2>
<p>
Sou Cal3ngo, editor de vídeo e motion designer. Faço edições com estilo forte, ritmo e impacto.
</p>
</section>

<section id="trabalhos">
<h2>Trabalhos</h2>

<div class="projetos">
<a href="#motion" class="card">
<h3>Motion</h3>
<p>Motion graphics.</p>
</a>

<a href="#gameplay" class="card">
<h3>Gameplay</h3>
<p>Edições dinâmicas.</p>
</a>
</div>

</section>

<section id="motion">
<h2>Motion</h2>

<div class="video-container">
<iframe src="https://www.youtube.com/embed/Nt0ATOS8zdY" allowfullscreen></iframe>
</div>

</section>

<section id="gameplay">
<h2>Gameplay</h2>

<div class="video-container">
<iframe src="https://www.youtube.com/embed/UC_jB999HI8" allowfullscreen></iframe>
</div>

</section>

<section id="contato">
<h2>Contato</h2>

<div class="social-icons">

<a href="https://www.instagram.com/cal3ngo.editor/" target="_blank">
<img src="social-media.png">
</a>

<a href="https://www.behance.net/cal3ngo" target="_blank">
<img src="behance.png">
</a>

<a href="https://www.youtube.com/@cal3ngo" target="_blank">
<img src="youtube.png">
</a>

<a href="https://discord.com/users/cal3ngao" target="_blank">
<img src="discord.png">
</a>

</div>

</section>

<footer>
© 2026 • Cal3ngo
</footer>

<script>

/* CURSOR OTIMIZADO */

const cursor = document.querySelector(".sniper-cursor");

document.addEventListener("mousemove", e=>{
cursor.style.left = e.clientX + "px";
cursor.style.top = e.clientY + "px";
});

</script>

</body>
</html>
