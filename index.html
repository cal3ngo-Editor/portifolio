<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cal3ngo | Editor & Motion Designer</title>

<style>

html{
scroll-behavior:smooth;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Arial,sans-serif;
}

body{
min-height:100vh;
color:#f5f5f5;
overflow-x:hidden;
position:relative;
}

/* FUNDO */

body::before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(rgba(5,0,10,0.75),rgba(5,0,10,0.9)),
url("k.gif");
background-size:cover;
background-position:center;
background-attachment:fixed;
z-index:-2;
}

body::after{
content:"";
position:fixed;
inset:0;
background:radial-gradient(circle at top,
rgba(140,0,255,0.35),
rgba(0,0,0,0.85));
z-index:-1;
}

/* HEADER */

header{
padding:120px 20px 80px;
text-align:center;
transform:scale(1.06);
transition:transform 0.25s ease-out;
}

.logo{
width:230px;
margin:0 auto 20px;
filter:drop-shadow(0 0 45px rgba(160,60,255,.7));
animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-12px);}
100%{transform:translateY(0);}
}

header h1{
font-size:3.4rem;
letter-spacing:4px;
background:linear-gradient(90deg,#ff2a2a,#b400ff,#ff2a2a);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:gradientMove 6s linear infinite, glowPulse 3s ease-in-out infinite;
}

@keyframes gradientMove{
0%{background-position:0%;}
100%{background-position:200%;}
}

@keyframes glowPulse{
0%{
text-shadow:0 0 10px rgba(255,0,100,0.4),
0 0 20px rgba(180,0,255,0.3);
}
50%{
text-shadow:0 0 25px rgba(255,0,100,0.7),
0 0 45px rgba(180,0,255,0.6);
}
100%{
text-shadow:0 0 10px rgba(255,0,100,0.4),
0 0 20px rgba(180,0,255,0.3);
}
}

header p{
margin-top:10px;
font-size:1.1rem;
color:#d1d1d1;
}

/* MENU */

nav{
margin-top:25px;
}

nav a{
color:#f5f5f5;
margin:0 18px;
text-decoration:none;
font-weight:600;
letter-spacing:1px;
position:relative;
}

nav a::after{
content:"";
position:absolute;
left:50%;
bottom:-8px;
width:0;
height:2px;
background:linear-gradient(90deg,#ff2a2a,#b400ff);
transition:.35s;
transform:translateX(-50%);
}

nav a:hover::after{
width:100%;
}

/* SEÇÕES */

section{
max-width:1100px;
margin:auto;
padding:90px 20px;
}

#sobre{
margin-top:40px;
}

.reveal{
opacity:0;
transform:translateY(40px);
transition:.8s;
}

.reveal.active{
opacity:1;
transform:translateY(0);
}

h2{
font-size:2.2rem;
margin-bottom:40px;
text-align:center;
background:linear-gradient(90deg,#ff2a2a,#b400ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SOBRE */

.sobre h2{
text-align:left;
}

.sobre p{
max-width:800px;
font-size:1.1rem;
color:#e0e0e0;
text-align:left;
}

/* CARDS */

.projetos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
margin-top:40px;
}

.card{
display:block;
text-decoration:none;
color:inherit;
background:linear-gradient(160deg,#0b0010,#120000);
padding:35px;
border-radius:18px;
border:1px solid rgba(160,60,255,.2);
transition:.35s;
text-align:center;
cursor:pointer;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 15px 45px rgba(160,60,255,.35);
}

.card h3{
font-size:1.4rem;
margin-bottom:10px;
color:#c77dff;
}

.card p{
color:#ccc;
}

/* VIDEO */

.video-container{
display:flex;
justify-content:center;
margin-bottom:60px;
}

.video-container iframe{
width:800px;
max-width:100%;
aspect-ratio:16/9;
border-radius:18px;
box-shadow:0 20px 60px rgba(180,0,255,.35);
}

/* CONTATO COM COR DO SITE */

.contato{
text-align:center;
}

.social-icons{
display:flex;
justify-content:center;
gap:25px;
margin-top:20px;
flex-wrap:wrap;
}

.social-icons a img{
width:55px;
transition:0.3s;

/* cor roxa do site */
filter: brightness(0) saturate(100%) invert(66%) sepia(77%) saturate(748%) hue-rotate(230deg) brightness(100%) contrast(101%) drop-shadow(0 0 10px rgba(199,125,255,.6));
}

.social-icons a img:hover{
transform:scale(1.15) translateY(-5px);

/* glow mais forte */
filter: brightness(0) saturate(100%) invert(66%) sepia(77%) saturate(748%) hue-rotate(230deg) brightness(120%) contrast(110%) drop-shadow(0 0 25px rgba(199,125,255,1));
}

/* FOOTER */

footer{
text-align:center;
padding:35px;
color:#888;
font-size:.9rem;
}

</style>
</head>

<body>

<header class="reveal">

<nav>

</p>
</section>

<div class="social-icons">

</a>

</a>

</div>

</section>

<footer>
